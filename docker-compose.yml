# RagnaLab Homelab - Root Docker Compose
# Usage: docker compose --profile <category> up -d
# Categories: infra, media, apps
#
# Examples:
#   docker compose --profile infra up -d        # Infrastructure services
#   docker compose --profile media up -d        # Media automation stack
#   docker compose --profile apps up -d         # Applications
#   docker compose --profile infra --profile media --profile apps up -d  # Everything

include:
  - path: stack/infra/docker-compose.yml
  - path: stack/media/docker-compose.yml
  - path: stack/apps/docker-compose.yml

# Shared networks - external networks created once, used by all services
# Create with: docker network create proxy && docker network create socket_proxy_network && docker network create media
networks:
  proxy:
    external: true
  socket_proxy_network:
    external: true
  media:
    external: true
