# Homepage Settings
# https://gethomepage.dev/configs/settings/

title: RagnaLab
favicon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/heimdall.png

# Theme - slate for clean dark look
theme: dark
color: slate

# Card appearance
cardBlur: md
background:
  image: https://images.unsplash.com/photo-1639262498805-17c7dc422d37?w=1920
  opacity: 15

# Header style
headerStyle: clean

# Status indicator style
statusStyle: dot

# Hide version number
hideVersion: true

# Layout configuration
layout:
  Infrastructure:
    style: row
    columns: 2
    icon: mdi-server-network
  Apps:
    style: row
    columns: 3
    icon: mdi-apps
