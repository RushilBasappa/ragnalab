# Homepage Settings
# https://gethomepage.dev/configs/settings/

title: RagnaLab

# Modern dark theme with neutral tones
theme: dark
color: zinc

# Glassy card effect
cardBlur: xl

# Subtle animated gradient background
background:
  image: https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1920
  opacity: 20
  blur: sm

# Clean header
headerStyle: clean

# Ping-style status dots
statusStyle: dot

# Hide clutter
hideVersion: true
disableCollapse: true

# Show container stats for monitoring feel
showStats: true

# Tight layout
layout:
  Infrastructure:
    style: row
    columns: 2
    header: false
  Apps:
    style: row
    columns: 4
    header: false
