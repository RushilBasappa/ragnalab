# Widgets Configuration
# https://gethomepage.dev/configs/widgets/

# Row 1: Branding + Time + Weather
- logo:
    icon: mdi-lightning-bolt

- greeting:
    text_size: 2xl
    text: RagnaLab

- datetime:
    text_size: l
    format:
      dateStyle: long
      timeStyle: short
      hour12: true

- openmeteo:
    label: Fremont
    latitude: 37.5485
    longitude: -121.9886
    units: imperial
    cache: 15

# Row 2: System Resources
- resources:
    label: System
    cpu: true
    memory: true
    refresh: 3000

- resources:
    label: Storage
    disk: /

- resources:
    label: Network
    network: eth0
    refresh: 3000

# Row 3: Search
- search:
    provider: google
    target: _blank
