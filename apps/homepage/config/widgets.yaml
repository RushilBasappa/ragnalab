# Widgets Configuration
# https://gethomepage.dev/configs/widgets/

- search:
    provider: google
    target: _blank
    focus: false

- resources:
    cpu: true
    memory: true
    cputemp: true
    uptime: true
    refresh: 3000

- datetime:
    text_size: l
    format:
      dateStyle: short
      timeStyle: short
      hour12: false
