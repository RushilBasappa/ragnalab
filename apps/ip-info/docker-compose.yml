# IP Info Service - Serves local and Tailscale IPs for Homepage
# Uses host network to access all interfaces

services:
  ip-info:
    build: .
    container_name: ip-info
    restart: unless-stopped
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.1'
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
