# Automated Docker Volume Backup
# Backs up all volumes with backup labels daily
# Notifies Uptime Kuma push monitor on completion

services:
  backup:
    image: offen/docker-volume-backup:v2
    container_name: backup
    restart: unless-stopped
    environment:
      # Daily backup at 3 AM
      BACKUP_CRON_EXPRESSION: "0 3 * * *"
      # Filename with timestamp for versioning
      BACKUP_FILENAME: "backup-%Y-%m-%dT%H-%M-%S.tar.gz"
      # Keep 7 days of backups
      BACKUP_RETENTION_DAYS: "7"
      # Symlink to latest for easy restore reference
      BACKUP_LATEST_SYMLINK: "backup-latest.tar.gz"
      # Uptime Kuma push notification on backup completion
      NOTIFICATION_URLS: "generic+https://status.ragnalab.xyz/api/push/bNe5s2P11a34tSDz9f7lM4FF1Pcj72zf?status=up&msg=Backup+completed"
    volumes:
      # Docker socket for container stop/start during backup
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount volumes to backup (read-only for safety)
      - vaultwarden-data:/backup/vaultwarden:ro
      # Local backup destination
      - /home/rushil/workspace/ragnalab/backups:/archive
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# Reference external volumes to backup
volumes:
  vaultwarden-data:
    external: true
    name: vaultwarden_vaultwarden-data
