# Traefik v3.6 Static Configuration
# RagnaLab Homelab Infrastructure

api:
  dashboard: true
  insecure: false  # Dashboard served via routers, not :8080

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls: true

providers:
  docker:
    # Connect via socket proxy, NOT direct socket mount
    endpoint: "tcp://socket-proxy:2375"
    exposedByDefault: false
    network: proxy
    watch: true
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: "rushil.basappa@gmail.com"
      storage: /etc/traefik/acme/acme.json
      # PRODUCTION - caServer omitted defaults to production
      # Staging: https://acme-staging-v02.api.letsencrypt.org/directory
      dnsChallenge:
        provider: cloudflare
        propagation:
          # Wait for DNS propagation before verification
          delayBeforeChecks: 60
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

log:
  level: INFO

accessLog:
  format: json
  bufferingSize: 100
