# RagnaLab Media Stack
# Profile: media
# Services: gluetun, port-manager, qbittorrent, prowlarr (+ flaresolverr), sonarr, radarr,
#           bazarr, recyclarr, unpackerr, jellyfin, jellyseerr, plex, maintainerr
#
# Usage: docker compose --profile media up -d

include:
  # qbittorrent stack includes gluetun and port-manager with proper depends_on
  - path: qbittorrent/docker-compose.yml
  - path: prowlarr/docker-compose.yml
  - path: sonarr/docker-compose.yml
  - path: radarr/docker-compose.yml
  - path: bazarr/docker-compose.yml
  - path: recyclarr/docker-compose.yml
  - path: unpackerr/docker-compose.yml
  - path: jellyfin/docker-compose.yml
  - path: jellyseerr/docker-compose.yml
  - path: plex/docker-compose.yml
  - path: maintainerr/docker-compose.yml

# Networks defined in root docker-compose.yml
# Service composes reference them as external: true
