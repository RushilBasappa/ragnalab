# Plex Media Server
# Access at: https://plex.ragnalab.xyz
# Setup: Get claim token from https://plex.tv/claim and add to .env as PLEX_CLAIM

services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    profiles: ["media"]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM:-}
    ports:
      # LAN access (for TV apps and local discovery)
      - "32400:32400"         # Plex web interface
      - "32469:32469"         # Plex DLNA
      - "1900:1900/udp"       # Plex DLNA discovery
      - "32410:32410/udp"     # GDM network discovery
      - "32412:32412/udp"     # GDM network discovery
      - "32413:32413/udp"     # GDM network discovery
      - "32414:32414/udp"     # GDM network discovery
    volumes:
      - plex-config:/config
      - /media/library:/data/media:ro
    networks:
      - proxy
    labels:
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.http.routers.plex.rule=Host(`plex.ragnalab.xyz`)"
      - "traefik.http.routers.plex.entrypoints=websecure"
      - "traefik.http.routers.plex.tls=true"
      - "traefik.http.routers.plex.tls.certresolver=letsencrypt"
      - "traefik.http.services.plex.loadbalancer.server.port=32400"
      - "traefik.docker.network=proxy"
      # Homepage dashboard
      - "homepage.group=Media"
      - "homepage.name=Plex"
      - "homepage.icon=plex.png"
      - "homepage.href=https://plex.ragnalab.xyz"
      - "homepage.description=Media Server"
      - "homepage.widget.type=plex"
      - "homepage.widget.url=http://plex:32400"
      - "homepage.widget.key=${PLEX_API_KEY}"
      - "homepage.server=ragnalab-docker"
      # Backup - stop container during backup for consistent state
      - "docker-volume-backup.stop-during-backup=plex"
      # Autokuma monitoring
      - "kuma.plex.http.name=Plex"
      - "kuma.plex.http.url=https://plex.ragnalab.xyz"
      - "kuma.plex.http.parent_name=media-group"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  plex-config:
    external: true
    name: ragnalab_plex-config

networks:
  proxy:
    external: true
