# Bazarr - Subtitle Automation
# Access at: https://bazarr.ragnalab.xyz
# Manages subtitles for media in Sonarr and Radarr libraries

services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    profiles: ["media"]
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Los_Angeles
    volumes:
      - bazarr_bazarr-config:/config
      - /media:/media  # Access to library folders for subtitle placement
    networks:
      - proxy
      - media
    labels:
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.ragnalab.xyz`)"
      - "traefik.http.routers.bazarr.entrypoints=websecure"
      - "traefik.http.routers.bazarr.tls=true"
      - "traefik.http.routers.bazarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
      - "traefik.docker.network=proxy"
      # Homepage dashboard
      - "homepage.group=Media"
      - "homepage.name=Bazarr"
      - "homepage.icon=bazarr.png"
      - "homepage.href=https://bazarr.ragnalab.xyz"
      - "homepage.description=Subtitles"
      - "homepage.widget.type=bazarr"
      - "homepage.widget.url=http://bazarr:6767"
      - "homepage.widget.key=${BAZARR_API_KEY}"
      - "homepage.server=my-docker"
      # Backup - stop during backup for SQLite consistency
      - "docker-volume-backup.stop-during-backup=bazarr"
      # Autokuma monitoring - HTTP and container
      - "kuma.bazarr.http.name=Bazarr"
      - "kuma.bazarr.http.url=https://bazarr.ragnalab.xyz"
      - "kuma.bazarr.http.parent_name=Media"
      - "kuma.bazarr-container.docker.name=Bazarr Container"
      - "kuma.bazarr-container.docker.docker_container=bazarr"
      - "kuma.bazarr-container.docker.docker_host=my-docker"
      - "kuma.bazarr-container.docker.parent_name=Containers"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bazarr_bazarr-config:
    external: true

networks:
  proxy:
    external: true
  media:
    external: true
