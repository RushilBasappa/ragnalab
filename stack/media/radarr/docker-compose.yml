# Radarr - Movie Automation
# Access at: https://radarr.ragnalab.xyz
# Monitors movies, searches indexers via Prowlarr, sends to qBittorrent

services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    profiles: ["media"]
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Los_Angeles
    volumes:
      - radarr-config:/config
      - /media:/media  # CRITICAL: Same path for hardlinks to work
    networks:
      - proxy
      - media
    labels:
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.ragnalab.xyz`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - "traefik.http.routers.radarr.middlewares=authelia@file"
      - "traefik.docker.network=proxy"
      # Homepage dashboard
      - "homepage.group=Media"
      - "homepage.name=Radarr"
      - "homepage.icon=radarr.png"
      - "homepage.href=https://radarr.ragnalab.xyz"
      - "homepage.description=Movies"
      - "homepage.widget.type=radarr"
      - "homepage.widget.url=http://radarr:7878"
      - "homepage.widget.key=${RADARR_API_KEY}"
      - "homepage.server=ragnalab-docker"
      # Backup - stop during backup for SQLite consistency
      - "docker-volume-backup.stop-during-backup=radarr"
      # Autokuma monitoring - HTTP only
      - "kuma.radarr.http.name=Radarr"
      - "kuma.radarr.http.url=https://radarr.ragnalab.xyz"
      - "kuma.radarr.http.parent_name=media-group"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  radarr-config:
    external: true
    name: ragnalab_radarr-config

networks:
  proxy:
    external: true
  media:
    external: true
