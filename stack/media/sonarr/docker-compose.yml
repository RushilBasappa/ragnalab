# Sonarr - TV Show Automation
# Access at: https://sonarr.ragnalab.xyz
# Monitors TV shows, searches indexers via Prowlarr, sends to qBittorrent

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    profiles: ["media"]
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Los_Angeles
    volumes:
      - sonarr-config:/config
      - /media:/media  # CRITICAL: Same path for hardlinks to work
    networks:
      - proxy
      - media
    labels:
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.ragnalab.xyz`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "traefik.http.routers.sonarr.middlewares=authelia@file"
      - "traefik.docker.network=proxy"
      # Homepage dashboard
      - "homepage.group=Media"
      - "homepage.name=Sonarr"
      - "homepage.icon=sonarr.png"
      - "homepage.href=https://sonarr.ragnalab.xyz"
      - "homepage.description=TV Shows"
      - "homepage.widget.type=sonarr"
      - "homepage.widget.url=http://sonarr:8989"
      - "homepage.widget.key=${SONARR_API_KEY}"
      - "homepage.server=ragnalab-docker"
      # Backup - stop during backup for SQLite consistency
      - "docker-volume-backup.stop-during-backup=sonarr"
      # Autokuma monitoring - HTTP only
      - "kuma.sonarr.http.name=Sonarr"
      - "kuma.sonarr.http.url=https://sonarr.ragnalab.xyz"
      - "kuma.sonarr.http.parent_name=media-group"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sonarr-config:
    external: true
    name: ragnalab_sonarr-config

networks:
  proxy:
    external: true
  media:
    external: true
