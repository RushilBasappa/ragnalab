# Prowlarr - Indexer Manager for arr apps
# Access at: https://prowlarr.ragnalab.xyz
# Centralizes indexer configuration for Sonarr/Radarr
# Includes Flaresolverr for Cloudflare bypass

services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    profiles: ["media"]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - prowlarr-config:/config
    networks:
      - media
      - proxy
    labels:
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.ragnalab.xyz`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.routers.prowlarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      - "traefik.docker.network=proxy"
      # Homepage dashboard
      - "homepage.group=Media"
      - "homepage.name=Prowlarr"
      - "homepage.icon=prowlarr.png"
      - "homepage.href=https://prowlarr.ragnalab.xyz"
      - "homepage.description=Indexer Manager"
      - "homepage.widget.type=prowlarr"
      - "homepage.widget.url=http://prowlarr:9696"
      - "homepage.widget.key=${PROWLARR_API_KEY}"
      - "homepage.server=ragnalab-docker"
      # Backup - stop container during backup for consistent state
      - "docker-volume-backup.stop-during-backup=prowlarr"
      # Autokuma monitoring - HTTP only
      # Define Media parent group (only needed once)
      - "kuma.media-group.group.name=Media"
      - "kuma.prowlarr.http.name=Prowlarr"
      - "kuma.prowlarr.http.url=https://prowlarr.ragnalab.xyz"
      - "kuma.prowlarr.http.parent_name=media-group"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Flaresolverr - Cloudflare bypass proxy for indexers
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    profiles: ["media"]
    environment:
      - TZ=America/Los_Angeles
      - LOG_LEVEL=info
    networks:
      - media
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  prowlarr-config:
    external: true
    name: ragnalab_prowlarr-config

networks:
  media:
    external: true
  proxy:
    external: true
