# Recyclarr - Syncs TRaSH Guides quality profiles to Sonarr/Radarr
# Runs on schedule to keep quality settings optimal
# Config synced from repo: ./config/configs/recyclarr.yml
#
# Manual sync: docker exec recyclarr recyclarr sync

services:
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    restart: unless-stopped
    profiles: ["media"]
    environment:
      - TZ=America/Los_Angeles
      - RADARR_API_KEY=${RADARR_API_KEY}
      - SONARR_API_KEY=${SONARR_API_KEY}
    volumes:
      - recyclarr-data:/config
      - ./config/configs/recyclarr.yml:/config/configs/recyclarr.yml:ro
    networks:
      - media
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  recyclarr-data:
    # Runtime data (cache, logs) - not in repo

networks:
  media:
    external: true
