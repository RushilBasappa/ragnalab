# Gluetun VPN Container - Network tunnel for torrent privacy
# All torrent traffic from qBittorrent routes through this VPN
# Access qBittorrent WebUI at: http://localhost:8080 (via gluetun)

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    profiles: ["media"]
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # VPN Provider configuration
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=wireguard
      # WireGuard credentials
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      # Server location preference
      - SERVER_COUNTRIES=${SERVER_COUNTRIES:-United States}
      # Timezone
      - TZ=America/Los_Angeles
    ports:
      # qBittorrent WebUI (exposed through gluetun for VPN routing)
      - "8080:8080"
    volumes:
      - gluetun_gluetun-data:/gluetun
    networks:
      - media
    # Note: Gluetun has built-in healthcheck at http://127.0.0.1:9999/
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gluetun_gluetun-data:
    external: true

networks:
  media:
    external: true
