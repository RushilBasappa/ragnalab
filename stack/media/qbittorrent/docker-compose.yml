# qBittorrent Download Client - Torrent downloads for Sonarr/Radarr
# All traffic routes through Gluetun VPN for privacy
# WebUI: http://localhost:8080 (port exposed via gluetun container)
# Note: First startup generates random admin password - check logs

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    profiles: ["media"]
    # CRITICAL: Route ALL traffic through Gluetun VPN
    # network_mode implicitly depends on gluetun - container must be running
    network_mode: "container:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - WEBUI_PORT=8080
    volumes:
      - qbittorrent-config:/config
      # Media paths - MUST match all arr apps for hardlinks to work
      - /media:/media
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "docker-volume-backup.stop-during-backup=qbittorrent"
      # Autokuma monitoring - container only (no HTTP endpoint via Traefik)
      - "kuma.qbittorrent-container.docker.name=qBittorrent"
      - "kuma.qbittorrent-container.docker.docker_container=qbittorrent"
      - "kuma.qbittorrent-container.docker.docker_host_name=ragnalab-docker"
      - "kuma.qbittorrent-container.docker.parent_name=media-group"

volumes:
  qbittorrent-config:
    external: true
    name: ragnalab_qbittorrent-config

# Note: No ports section - ports are exposed on gluetun container
# Note: No networks section - uses gluetun's network stack
