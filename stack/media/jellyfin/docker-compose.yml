# Jellyfin - Free Software Media Server
# Access at: https://jellyfin.ragnalab.xyz
# Configuration: Direct-play only (no transcoding - Pi 5 compatibility)

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    profiles: ["media"]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - JELLYFIN_PublishedServerUrl=http://10.0.0.245:8096
    ports:
      # LAN access (for TV apps and local discovery)
      - "8096:8096"           # HTTP web interface
      - "7359:7359/udp"       # Jellyfin autodiscovery
    volumes:
      - jellyfin-config:/config
      - /media/library:/data/media:ro
    networks:
      - proxy
    labels:
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.ragnalab.xyz`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      - "traefik.docker.network=proxy"
      # Homepage dashboard
      - "homepage.group=Media"
      - "homepage.name=Jellyfin"
      - "homepage.icon=jellyfin.png"
      - "homepage.href=https://jellyfin.ragnalab.xyz"
      - "homepage.description=Media Server"
      - "homepage.widget.type=jellyfin"
      - "homepage.widget.url=http://jellyfin:8096"
      - "homepage.widget.key=${JELLYFIN_API_KEY}"
      - "homepage.server=ragnalab-docker"
      # Backup - stop container during backup for consistent state
      - "docker-volume-backup.stop-during-backup=jellyfin"
      # Autokuma monitoring - HTTP only
      - "kuma.jellyfin.http.name=Jellyfin"
      - "kuma.jellyfin.http.url=https://jellyfin.ragnalab.xyz"
      - "kuma.jellyfin.http.parent_name=media-group"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  jellyfin-config:
    external: true
    name: ragnalab_jellyfin-config

networks:
  proxy:
    external: true
