# Pi-hole - Network-wide DNS Ad Blocking
# Access at: https://pihole.ragnalab.xyz
# DNS queries: 10.0.0.200
#
# Architecture: Pi-hole uses macvlan network to get its own LAN IP (10.0.0.200)
# for DHCP capability without port conflicts with Traefik.
# Web UI is routed through Traefik via the proxy network.

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    # Note: hostname/domainname removed to prevent Docker from adding
    # pihole.ragnalab.xyz -> container IPs in /etc/hosts, which would
    # override our DNS config that points to Traefik's Tailscale IP
    profiles: ["apps"]
    cap_add:
      - NET_ADMIN  # Required for DHCP
    environment:
      TZ: 'America/Los_Angeles'
      # Pi-hole v6 uses FTLCONF_ prefix for all settings
      FTLCONF_webserver_api_password: '${PIHOLE_PASSWORD}'
      FTLCONF_dns_listeningMode: 'all'
      # Upstream DNS servers (used by Pi-hole for recursion)
      FTLCONF_dns_upstreams: '1.1.1.1;9.9.9.9'
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    networks:
      pihole_net:
        ipv4_address: 10.0.0.200
      proxy:
    labels:
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.rule=Host(`pihole.ragnalab.xyz`)"
      - "traefik.http.routers.pihole.entrypoints=websecure"
      - "traefik.http.routers.pihole.tls=true"
      - "traefik.http.routers.pihole.tls.certresolver=letsencrypt"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"
      # Homepage dashboard
      - "homepage.group=Network"
      - "homepage.name=Pi-hole"
      - "homepage.icon=pi-hole.png"
      - "homepage.href=https://pihole.ragnalab.xyz/admin"
      - "homepage.description=DNS Ad Blocking"
      - "homepage.widget.type=pihole"
      - "homepage.widget.url=http://pihole:80"
      - "homepage.widget.version=6"
      - "homepage.widget.key=${PIHOLE_API_KEY}"
      - "homepage.server=my-docker"
      # Autokuma monitoring - HTTP only
      - "kuma.pihole.http.name=Pi-hole"
      - "kuma.pihole.http.url=https://pihole.ragnalab.xyz/admin/"
      - "kuma.pihole.http.parent_name=apps-group"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  pihole_net:
    driver: macvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet: 10.0.0.0/24
          gateway: 10.0.0.1
          ip_range: 10.0.0.200/32
  proxy:
    external: true
