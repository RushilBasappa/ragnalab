# Vaultwarden - Self-hosted Bitwarden-compatible Password Manager
# Access at: https://vault.ragnalab.xyz
# Admin panel: https://vault.ragnalab.xyz/admin

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    profiles: ["apps"]
    environment:
      # Admin panel with argon2id hashed token
      # Generate: docker run --rm -it vaultwarden/server /vaultwarden hash
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
      # Security settings - invite only, no open signups
      SIGNUPS_ALLOWED: "false"
      INVITATIONS_ALLOWED: "true"
      # Required for correct invitation links and WebSocket connections
      DOMAIN: "https://vault.ragnalab.xyz"
      # 2FA policy: TOTP authenticator only (more secure, no SMTP required)
      AUTHENTICATOR_ALLOWED: "true"
      EMAIL_2FA_ALLOWED: "false"
      # Note: SMTP variables intentionally omitted - Vaultwarden validates them
      # strictly and fails if partially set. To enable email, add all SMTP_*
      # variables to docker-compose.yml manually when ready to configure email.
    volumes:
      - vaultwarden-data:/data
    networks:
      - proxy
    labels:
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`vault.ragnalab.xyz`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls=true"
      - "traefik.http.routers.vaultwarden.tls.certresolver=letsencrypt"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"
      # Homepage dashboard
      - "homepage.group=Apps"
      - "homepage.name=Vaultwarden"
      - "homepage.icon=bitwarden.png"
      - "homepage.href=https://vault.ragnalab.xyz"
      - "homepage.description=Password Manager"
      - "homepage.server=my-docker"
      # Backup - stop container during backup for consistent SQLite state
      - "docker-volume-backup.stop-during-backup=vaultwarden"
      # Autokuma monitoring - HTTP and container
      - "kuma.vaultwarden.http.name=Vaultwarden"
      - "kuma.vaultwarden.http.url=https://vault.ragnalab.xyz"
      - "kuma.vaultwarden.http.parent_name=Apps"
      - "kuma.vaultwarden-container.docker.name=Vaultwarden Container"
      - "kuma.vaultwarden-container.docker.docker_container=vaultwarden"
      - "kuma.vaultwarden-container.docker.docker_host=my-docker"
      - "kuma.vaultwarden-container.docker.parent_name=Containers"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vaultwarden-data:
    external: true
    name: vaultwarden_vaultwarden-data

networks:
  proxy:
    external: true
