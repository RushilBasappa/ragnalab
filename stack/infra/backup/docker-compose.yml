# Automated Docker Volume Backup
# Backs up all volumes with backup labels daily
# Notifies Uptime Kuma push monitor on completion

services:
  backup:
    image: offen/docker-volume-backup:v2
    container_name: backup
    restart: unless-stopped
    profiles: ["infra"]
    environment:
      # Daily backup at 3 AM
      BACKUP_CRON_EXPRESSION: "0 3 * * *"
      # Filename with timestamp for versioning
      BACKUP_FILENAME: "backup-%Y-%m-%dT%H-%M-%S.tar.gz"
      # Keep 7 days of backups
      BACKUP_RETENTION_DAYS: "7"
      # Symlink to latest for easy restore reference
      BACKUP_LATEST_SYMLINK: "backup-latest.tar.gz"
      # Uptime Kuma push URL (from .env)
      BACKUP_PUSH_URL: "${BACKUP_PUSH_URL}"
      # Stop containers with this label during backup
      BACKUP_STOP_DURING_BACKUP_LABEL: "vaultwarden,prowlarr,sonarr,radarr,bazarr,jellyfin,jellyseerr,qbittorrent,uptime-kuma"
    labels:
      # Uptime Kuma push notification after backup completes
      - "docker-volume-backup.copy-post=/bin/sh -c 'wget -q -O /dev/null $${BACKUP_PUSH_URL}'"
      # --- Autokuma monitoring labels (container only - no HTTP endpoint) ---
      - "kuma.backup-container.docker.name=Backup Container"
      - "kuma.backup-container.docker.docker_container=backup"
      - "kuma.backup-container.docker.docker_host_name=ragnalab-docker"
      - "kuma.backup-container.docker.parent_name=infra-group"
    volumes:
      # Docker socket for container stop/start during backup
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount volumes to backup (read-only for safety)
      - vaultwarden-data:/backup/vaultwarden:ro
      # Pi-hole config (bind mount, not Docker volume)
      - /home/rushil/workspace/ragnalab/stack/infra/pihole/etc-pihole:/backup/pihole:ro
      # Uptime Kuma (SQLite database - stop during backup)
      - uptime-kuma-data:/backup/uptime-kuma:ro
      # RustDesk server keys (safe for hot backup)
      - rustdesk-data:/backup/rustdesk:ro
      # Traefik ACME certificates (bind mount, safe for hot backup)
      - /home/rushil/workspace/ragnalab/stack/infra/traefik/config/acme:/backup/traefik-acme:ro
      # Media stack volumes
      - prowlarr-config:/backup/prowlarr:ro
      - sonarr-config:/backup/sonarr:ro
      - radarr-config:/backup/radarr:ro
      - bazarr-config:/backup/bazarr:ro
      - jellyfin-config:/backup/jellyfin:ro
      - jellyseerr-config:/backup/jellyseerr:ro
      - qbittorrent-config:/backup/qbittorrent:ro
      - gluetun-data:/backup/gluetun:ro
      # Local backup destination
      - /home/rushil/workspace/ragnalab/backups:/archive
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# Reference external volumes to backup
# Note: uptime-kuma-data is declared in uptime-kuma/docker-compose.yml (same include tree)
volumes:
  vaultwarden-data:
    external: true
    name: ragnalab_vaultwarden-data
  rustdesk-data:
    external: true
    name: ragnalab_rustdesk-data
  prowlarr-config:
    external: true
    name: ragnalab_prowlarr-config
  sonarr-config:
    external: true
    name: ragnalab_sonarr-config
  radarr-config:
    external: true
    name: ragnalab_radarr-config
  bazarr-config:
    external: true
    name: ragnalab_bazarr-config
  jellyfin-config:
    external: true
    name: ragnalab_jellyfin-config
  jellyseerr-config:
    external: true
    name: ragnalab_jellyseerr-config
  qbittorrent-config:
    external: true
    name: ragnalab_qbittorrent-config
  gluetun-data:
    external: true
    name: ragnalab_gluetun-data
