# Authelia SSO Portal
# Access at: https://auth.ragnalab.xyz

services:
  authelia:
    image: authelia/authelia:4.39.14
    container_name: authelia
    restart: unless-stopped
    profiles: ["infra"]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
    environment:
      - TZ=America/Los_Angeles
      # Secrets from .env file
      - AUTHELIA_JWT_SECRET_FILE=/config/secrets/jwt
      - AUTHELIA_SESSION_SECRET_FILE=/config/secrets/session
      - AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE=/config/secrets/storage
    volumes:
      - ./config:/config
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # Router for auth.ragnalab.xyz - NO auth middleware (critical!)
      - "traefik.http.routers.authelia.rule=Host(`auth.ragnalab.xyz`)"
      - "traefik.http.routers.authelia.entrypoints=websecure"
      - "traefik.http.routers.authelia.tls=true"
      - "traefik.http.routers.authelia.tls.certresolver=letsencrypt"
      - "traefik.http.services.authelia.loadbalancer.server.port=9091"
      - "traefik.docker.network=proxy"
      # --- Autokuma monitoring labels ---
      - "kuma.authelia.http.name=Authelia"
      - "kuma.authelia.http.url=https://auth.ragnalab.xyz"
      - "kuma.authelia.http.parent_name=infra-group"
      # --- Homepage labels ---
      - "homepage.group=Infrastructure"
      - "homepage.name=Authelia"
      - "homepage.icon=authelia.png"
      - "homepage.href=https://auth.ragnalab.xyz"
      - "homepage.description=SSO Portal"
      - "homepage.server=ragnalab-docker"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy:
    external: true
