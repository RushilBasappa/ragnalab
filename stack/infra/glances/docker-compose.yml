# Glances - System Monitoring Dashboard
# Access at: https://glances.ragnalab.xyz

services:
  glances:
    image: nicolargo/glances:latest
    container_name: glances
    restart: unless-stopped
    profiles: ["infra"]
    pid: host
    privileged: true
    environment:
      - "GLANCES_OPT=-w"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro
      - /:/rootfs:ro
    networks:
      - proxy
    labels:
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.http.routers.glances.rule=Host(`glances.ragnalab.xyz`)"
      - "traefik.http.routers.glances.entrypoints=websecure"
      - "traefik.http.routers.glances.tls=true"
      - "traefik.http.routers.glances.tls.certresolver=letsencrypt"
      - "traefik.http.services.glances.loadbalancer.server.port=61208"
      - "traefik.http.routers.glances.middlewares=authelia@file"
      - "traefik.docker.network=proxy"
      # Homepage dashboard
      - "homepage.group=Infrastructure"
      - "homepage.name=Glances"
      - "homepage.icon=glances.png"
      - "homepage.href=https://glances.ragnalab.xyz"
      - "homepage.description=System Monitor"
      - "homepage.server=ragnalab-docker"
      # Autokuma monitoring - HTTP only
      - "kuma.glances.http.name=Glances"
      - "kuma.glances.http.url=https://glances.ragnalab.xyz"
      - "kuma.glances.http.parent_name=infra-group"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy:
    external: true
