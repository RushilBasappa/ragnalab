# FileBrowser - Web-based File Manager
# Access at: https://files.ragnalab.xyz

services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    profiles: ["infra"]
    user: "1000:1000"
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - filebrowser-config:/config
      - /media:/srv/media
      - /var/lib/docker/volumes:/srv/docker-volumes:ro
    networks:
      - proxy
    labels:
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.http.routers.filebrowser.rule=Host(`files.ragnalab.xyz`)"
      - "traefik.http.routers.filebrowser.entrypoints=websecure"
      - "traefik.http.routers.filebrowser.tls=true"
      - "traefik.http.routers.filebrowser.tls.certresolver=letsencrypt"
      - "traefik.http.services.filebrowser.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"
      # Homepage dashboard
      - "homepage.group=Infrastructure"
      - "homepage.name=FileBrowser"
      - "homepage.icon=filebrowser.png"
      - "homepage.href=https://files.ragnalab.xyz"
      - "homepage.description=File Manager"
      - "homepage.server=ragnalab-docker"
      # Autokuma monitoring
      - "kuma.filebrowser.http.name=FileBrowser"
      - "kuma.filebrowser.http.url=https://files.ragnalab.xyz"
      - "kuma.filebrowser.http.parent_name=infra-group"
    command:
      - --database=/config/filebrowser.db
      - --root=/srv
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  filebrowser-config:
    external: true
    name: ragnalab_filebrowser-config

networks:
  proxy:
    external: true
