# RagnaLab Infrastructure Services
# Profile: infra
# Services: traefik, socket-proxy, uptime-kuma, homepage, backup, glances, pihole

include:
  - path: traefik/docker-compose.yml
  - path: socket-proxy/docker-compose.yml
  - path: uptime-kuma/docker-compose.yml
  - path: homepage/docker-compose.yml
  - path: backup/docker-compose.yml
  - path: autokuma/docker-compose.yml
  - path: glances/docker-compose.yml
  - path: pihole/docker-compose.yml

# Networks defined in root docker-compose.yml
# Service composes reference them as external: true
