# Uptime Kuma - Service Health Monitoring
# Access at: https://status.ragnalab.xyz

services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    profiles: ["infra"]
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - proxy
      - socket_proxy_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`status.ragnalab.xyz`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma.tls=true"
      - "traefik.http.routers.uptime-kuma.tls.certresolver=letsencrypt"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"
      - "traefik.docker.network=proxy"
      # --- Autokuma monitoring labels ---
      - "kuma.uptime-kuma.http.name=Uptime Kuma"
      - "kuma.uptime-kuma.http.url=https://status.ragnalab.xyz"
      - "kuma.uptime-kuma.http.parent_name=infra-group"
      - "kuma.uptime-kuma-container.docker.name=Uptime Kuma Container"
      - "kuma.uptime-kuma-container.docker.docker_container=uptime-kuma"
      - "kuma.uptime-kuma-container.docker.docker_host_name=my-docker"
      - "kuma.uptime-kuma-container.docker.parent_name=containers-group"
      # --- Homepage labels ---
      - "homepage.group=Infrastructure"
      - "homepage.name=Uptime Kuma"
      - "homepage.icon=uptime-kuma.png"
      - "homepage.href=https://status.ragnalab.xyz"
      - "homepage.description=Service Monitoring"
      - "homepage.widget.type=uptimekuma"
      - "homepage.widget.url=http://uptime-kuma:3001"
      - "homepage.widget.slug=status-page"
      - "homepage.server=my-docker"
      # --- Backup labels ---
      - "docker-volume-backup.stop-during-backup=uptime-kuma"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  uptime-kuma-data:
    external: true
    name: ragnalab_uptime-kuma-data

# Networks defined in root docker-compose.yml
